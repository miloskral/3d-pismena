<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Channel Letters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#02070d;
  --panel:#09131d;
  --cyan:#52e2ff;
  --cyan2:#00c8ff;
  --text:#e9fbff;
  --muted:#8ca6b6;
  --border:rgba(82,226,255,0.1);
  --glow:rgba(82,226,255,0.35);
}
*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  font-family:Inter,sans-serif;
  background:
    radial-gradient(circle at top, rgba(82,226,255,0.1), transparent 35%),
    linear-gradient(180deg,#02070d,#06111a 50%,#02070d);
  color:var(--text);
  overflow-x:hidden;
}
body::before{
  content:''; position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(82,226,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg,rgba(82,226,255,0.04) 1px, transparent 1px);
  background-size:70px 70px;
  z-index:0; pointer-events:none;
}
nav{
  position:fixed; top:0; width:100%;
  backdrop-filter:blur(20px);
  background:rgba(2,7,13,0.75);
  border-bottom:1px solid var(--border);
  z-index:1000;
}
.nav-inner{
  max-width:1400px; margin:auto;
  padding:16px 28px;
  display:flex; justify-content:space-between; align-items:center;
}
.nav-left{ display:flex; align-items:center; gap:18px; }
.lang{
  display:flex; gap:4px; padding:6px 8px;
  border-radius:12px; background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
}
.lang button{
  background:none; border:none; font-family:Inter,sans-serif;
  font-size:13px; font-weight:600; cursor:pointer;
  padding:5px 10px; border-radius:8px; transition:.2s; color:var(--muted);
}
.lang button.active{ background:rgba(82,226,255,0.12); color:var(--cyan); }
.lang button:hover{ color:var(--text); }
.logo{ display:flex; align-items:center; gap:14px; text-decoration:none; }
.logo img{ width:48px; height:48px; border-radius:14px; box-shadow:0 0 20px var(--glow); }
.logo strong{ font-size:17px; font-weight:800; display:block; color:var(--text); }
.logo span{ font-size:12px; color:var(--muted); }
.btn{
  padding:12px 22px; border-radius:14px; text-decoration:none;
  font-family:Inter,sans-serif; font-weight:700; font-size:14px;
  display:inline-flex; align-items:center; gap:8px;
  transition:.25s; cursor:pointer; border:none;
}
.btn-primary{
  background:linear-gradient(135deg,var(--cyan),var(--cyan2));
  color:#001820; box-shadow:0 4px 20px rgba(82,226,255,0.3);
}
.btn-primary:hover{ transform:translateY(-2px); box-shadow:0 8px 28px rgba(82,226,255,0.45); }
.btn-secondary{
  border:1px solid rgba(82,226,255,0.18);
  background:rgba(82,226,255,0.04); color:var(--text);
}
.btn-secondary:hover{ background:rgba(82,226,255,0.1); border-color:rgba(82,226,255,0.35); }
.btn-lg{ padding:16px 28px; font-size:16px; border-radius:16px; }
.hero{
  min-height:100vh; display:flex; flex-direction:column; justify-content:center;
  padding:140px 28px 80px; position:relative; z-index:1;
}
.hero-inner{
  max-width:1400px; margin:auto;
  display:grid; grid-template-columns:1fr 1fr;
  gap:80px; align-items:center;
}
.hero-content{ opacity:0; transform:translateY(28px); animation:fadeUp .7s .1s forwards; }
.hero-visual{ opacity:0; transform:translateY(28px); animation:fadeUp .7s .3s forwards; }
@keyframes fadeUp{ to{ opacity:1; transform:translateY(0); } }
.badge{
  display:inline-flex; align-items:center; gap:8px;
  padding:9px 16px; border-radius:999px;
  background:rgba(82,226,255,0.07); border:1px solid rgba(82,226,255,0.2);
  color:var(--cyan); font-size:13px; font-weight:600; margin-bottom:24px;
}
.badge-dot{
  width:6px; height:6px; border-radius:50%;
  background:var(--cyan); box-shadow:0 0 8px var(--cyan);
  animation:pulse 2s infinite;
}
@keyframes pulse{ 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.5;transform:scale(1.3);} }
.hero h1{ font-size:68px; line-height:1; font-weight:900; letter-spacing:-2.5px; margin-bottom:22px; }
.glow{ color:var(--cyan); text-shadow:0 0 30px rgba(82,226,255,0.7),0 0 70px rgba(82,226,255,0.3); }
.hero p{ font-size:17px; line-height:1.75; color:var(--muted); margin-bottom:36px; max-width:480px; }
.hero-buttons{ display:flex; gap:12px; flex-wrap:wrap; }
.visual-card{
  border-radius:28px; overflow:hidden;
  border:1px solid var(--border); background:var(--panel);
  box-shadow:0 0 60px rgba(82,226,255,0.1),0 30px 80px rgba(0,0,0,0.5);
}
.visual-card img{ width:100%; display:block; }
.stats-bar{
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:1px; background:var(--border); border:1px solid var(--border);
  border-radius:20px; overflow:hidden;
  max-width:1400px; margin:48px auto 0;
  opacity:0; animation:fadeUp .7s .55s forwards;
}
.stat{ background:var(--panel); padding:26px 24px; text-align:center; }
.stat strong{ font-size:32px; font-weight:900; color:var(--cyan); display:block; margin-bottom:4px; }
.stat span{ font-size:13px; color:var(--muted); }
section{ padding:100px 28px; position:relative; z-index:1; }
.container{ max-width:1400px; margin:auto; }
.section-label{
  display:inline-flex; align-items:center; gap:8px;
  font-size:11px; font-weight:700; letter-spacing:.12em;
  text-transform:uppercase; color:var(--cyan); margin-bottom:14px;
}
.section-label::before{ content:''; width:18px; height:1px; background:var(--cyan); }
.section-title{ text-align:center; margin-bottom:56px; }
.section-title .section-label{ justify-content:center; }
.section-title h2{ font-size:46px; font-weight:900; letter-spacing:-1.5px; margin-bottom:14px; }
.section-title p{ color:var(--muted); font-size:16px; }
.feat-tag{
  display:inline-block; padding:4px 10px; border-radius:8px;
  background:rgba(82,226,255,0.07); border:1px solid rgba(82,226,255,0.15);
  color:var(--cyan); font-size:12px; font-weight:500;
}
.feature-card{
  padding:28px; border-radius:22px;
  background:linear-gradient(160deg,rgba(10,20,32,.95),rgba(5,12,20,.95));
  border:1px solid var(--border); transition:.3s; position:relative; overflow:hidden;
}
.feature-card::before{
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(82,226,255,.06),transparent 60%);
  opacity:0; transition:.3s;
}
.feature-card:hover{ transform:translateY(-5px); border-color:rgba(82,226,255,.25); }
.feature-card:hover::before{ opacity:1; }
.feature-icon{
  width:44px; height:44px; border-radius:12px;
  background:rgba(82,226,255,.08); border:1px solid rgba(82,226,255,.15);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; margin-bottom:16px;
}
.feature-card h3{ font-size:17px; font-weight:700; margin-bottom:8px; }
.feature-card p{ color:var(--muted); font-size:14px; line-height:1.65; }
.screenshots-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.screenshot-card{
  border-radius:18px; overflow:hidden;
  border:1px solid var(--border); background:var(--panel);
  position:relative; cursor:pointer; transition:.35s;
}
.screenshot-card:hover{ transform:translateY(-5px); box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 30px rgba(82,226,255,.1); }
.screenshot-card img{ width:100%; display:block; }
.screenshot-overlay{
  position:absolute; bottom:0; left:0; right:0; padding:18px 20px;
  background:linear-gradient(0deg,rgba(2,7,13,.92) 0%,transparent 100%);
}
.screenshot-label{ font-size:14px; font-weight:700; }
.screenshot-desc{ font-size:12px; color:var(--muted); margin-top:4px; line-height:1.5; }
.workflow{
  background:linear-gradient(135deg,rgba(10,20,32,.8),rgba(5,12,20,.8));
  border:1px solid var(--border); border-radius:28px; padding:56px;
  display:grid; grid-template-columns:1fr 1fr; gap:70px; align-items:center;
}
.workflow h2{ font-size:38px; font-weight:900; letter-spacing:-1px; margin-bottom:32px; }
.workflow-steps{ display:flex; flex-direction:column; }
.workflow-step{
  display:flex; gap:18px; padding:22px 0; border-bottom:1px solid var(--border);
}
.workflow-step:last-child{ border-bottom:none; }
.step-number{
  width:38px; height:38px; border-radius:11px;
  background:rgba(82,226,255,.08); border:1px solid rgba(82,226,255,.2);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:800; color:var(--cyan); flex-shrink:0;
}
.step-content h4{ font-size:15px; font-weight:700; margin-bottom:5px; }
.step-content p{ font-size:13px; color:var(--muted); line-height:1.6; }
.workflow-visual img{ width:100%; border-radius:18px; border:1px solid var(--border); }
.pricing-card{
  max-width:640px; margin:auto; padding:56px 48px;
  border-radius:28px;
  background:linear-gradient(160deg,rgba(12,24,38,.98),rgba(6,14,22,.98));
  border:1px solid rgba(82,226,255,.15); text-align:center;
  position:relative; overflow:hidden;
}
.pricing-card::before{
  content:''; position:absolute; top:-80px; left:50%; transform:translateX(-50%);
  width:280px; height:280px;
  background:radial-gradient(circle,rgba(82,226,255,.07),transparent 70%);
  pointer-events:none;
}
.pricing-badge{
  display:inline-block; padding:7px 14px; border-radius:999px;
  background:rgba(82,226,255,.1); border:1px solid rgba(82,226,255,.2);
  color:var(--cyan); font-size:11px; font-weight:700;
  letter-spacing:.07em; text-transform:uppercase; margin-bottom:24px;
}
.price-amount{ font-size:88px; font-weight:900; color:var(--cyan); line-height:1; text-shadow:0 0 50px rgba(82,226,255,.4); }
.price-period{ font-size:20px; color:var(--muted); margin-bottom:4px; }
.pricing-divider{ height:1px; background:var(--border); margin:28px 0; }
.pricing-features{ display:flex; flex-direction:column; gap:12px; margin-bottom:32px; text-align:left; }
.pricing-feature{ display:flex; align-items:center; gap:10px; font-size:14px; }
.pricing-feature::before{
  content:'✓'; width:22px; height:22px; border-radius:7px;
  background:rgba(82,226,255,.1); border:1px solid rgba(82,226,255,.2);
  color:var(--cyan); font-size:12px; font-weight:700;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.download-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:680px; margin:0 auto; }
.download-btn{
  padding:20px 24px; border-radius:18px; border:1px solid var(--border);
  background:var(--panel); color:var(--text); text-decoration:none;
  display:flex; align-items:center; gap:14px; transition:.3s;
}
.download-btn:hover{
  border-color:rgba(82,226,255,.3); background:rgba(82,226,255,.05);
  transform:translateY(-3px); box-shadow:0 12px 36px rgba(0,0,0,.4);
}
.download-icon{ font-size:26px; }
.download-text strong{ font-size:15px; font-weight:700; display:block; margin-bottom:2px; }
.download-text span{ font-size:12px; color:var(--muted); }
footer{ padding:56px 28px; border-top:1px solid var(--border); position:relative; z-index:1; }
.footer-inner{ max-width:1400px; margin:auto; display:flex; justify-content:space-between; align-items:center; }
.footer-logo{ display:flex; align-items:center; gap:12px; }
.footer-logo img{ width:40px; border-radius:11px; }
.footer-logo strong{ font-size:15px; font-weight:700; }
footer p{ color:var(--muted); font-size:13px; }
.reveal{ opacity:0; transform:translateY(22px); transition:opacity .65s,transform .65s; }
.reveal.visible{ opacity:1; transform:translateY(0); }
@media(max-width:1100px){
  .hero-inner{ grid-template-columns:1fr; }
  .hero h1{ font-size:52px; }
  .workflow{ grid-template-columns:1fr; padding:36px; }
  .workflow-visual{ display:none; }
  .footer-inner{ flex-direction:column; gap:16px; text-align:center; }
  .feat-4col{ grid-template-columns:repeat(2,1fr)!important; }
}
@media(max-width:700px){
  .hero h1{ font-size:38px; }
  .screenshots-grid{ grid-template-columns:1fr; }
  .download-grid{ grid-template-columns:1fr; }
  .stats-bar{ grid-template-columns:1fr; }
  .pricing-card{ padding:36px 24px; }
  .price-amount{ font-size:72px; }
  section{ padding:70px 18px; }
  .feat-2col{ grid-template-columns:1fr!important; }
  .feat-4col{ grid-template-columns:1fr!important; }
}
</style>
</head>

function applyLang(l){
  document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  const d=T[l];
  const ids=['navDl','logoSub','badge','h1','heroP','dlTrial','viewFeat','stat1','stat2','stat3',
    'featLabel','featH','featSub',
    'f1h','f1p','f1t1','f1t2','f1t3','f2h','f2p','f2t1','f2t2','f2t3',

    'sc1l','sc1d','sc2l','sc2d','sc3l','sc3d','sc4l','sc4d','sc5l','sc5d','sc6l','sc6d','sc7l','sc7d',
    'wfLabel','wfH','w1h','w1p','w2h','w2p','w3h','w3p',
    'prLabel','prH','prBadge','pr1','pr2','pr3','pr4','pr5','pr6','prBtn',
    'dlLabel','dlH','dlSub','dlMac','dlMacSub','dlWin','dlWinSub','copy'];
  const htmlIds=['h1','f5p','f7p'];
  ids.forEach(key=>{
    const el=document.getElementById(key);
    if(!el||d[key]==null)return;
    if(htmlIds.includes(key)) el.innerHTML=d[key]; else el.textContent=d[key];
  });
}
